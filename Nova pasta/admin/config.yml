backend:
  name: git-gateway
  branch: main # Se o seu GitHub usar "master", troque aqui para master

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "avisos"
    label: "Mural PASCOM"
    folder: "content/avisos"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "datetime"}
      - {label: "Imagem de Capa", name: "image", widget: "image"}
      - {label: "Texto do Aviso", name: "body", widget: "markdown"}

  - name: "horarios"
    label: "Horários de Missas"
    files:
      - label: "Tabela de Missas"
        name: "missas"
        file: "content/missas.json"
        fields:
          - label: "Lista de Missas"
            name: "lista"
            widget: "list"
            fields:
              - {label: "Dia", name: "dia", widget: "string"}
              - {label: "Local", name: "local", widget: "string"}
              - {label: "Hora", name: "hora", widget: "string"}
